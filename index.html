<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신기한 색맹 체험 앱 (Color Blindness Simulator)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 프리미엄 느낌의 폰트 설정 및 부드러운 전환 효과 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col justify-between overflow-hidden">

    <!-- 고성능 실시간 색각 이상 필터를 처리하기 위한 SVG 정의 (화면에는 보이지 않음) -->
    <svg class="absolute w-0 h-0 hidden" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- 적록색맹 (Deuteranopia - 제2색각이상 기준의 표준 변환 행렬) -->
            <filter id="deuteranopia-filter" color-interpolation-filters="sRGB">
                <feColorMatrix type="matrix" values="
                    0.625, 0.375, 0,     0, 0
                    0.7,   0.3,   0,     0, 0
                    0,     0.3,   0.7,   0, 0
                    0,     0,     0,     1, 0
                "/>
            </filter>
            <!-- 청황색맹 (Tritanopia - 제3색각이상 기준의 표준 변환 행렬) -->
            <filter id="tritanopia-filter" color-interpolation-filters="sRGB">
                <feColorMatrix type="matrix" values="
                    0.95,  0.05,  0,     0, 0
                    0,     0.433, 0.567, 0, 0
                    0,     0.475, 0.525, 0, 0
                    0,     0,     0,     1, 0
                "/>
            </filter>
        </defs>
    </svg>

    <!-- 상단 헤더 영역 -->
    <header class="w-full max-w-md mx-auto px-6 pt-6 pb-2 text-center">
        <h1 class="text-xl font-bold tracking-tight text-gray-200">색맹 체험 시뮬레이터</h1>
        <p class="text-xs text-gray-500 mt-1">다양한 색각 이상 시야를 실시간으로 체험해 보세요</p>
    </header>

    <!-- 메인 컨텐츠 영역 (최대 너비를 모바일 사이즈로 제한하여 앱 느낌 극대화) -->
    <main class="w-full max-w-md mx-auto px-6 flex-1 flex flex-col justify-center gap-6">
        
        <!-- 1. 상단 미디어 선택 버튼 (가로 배치) -->
        <div class="grid grid-cols-2 gap-3 w-full">
            <!-- PHOTO 버튼 -->
            <button id="btn-photo" class="flex items-center justify-center gap-2 py-3 px-4 rounded-2xl bg-gray-950 text-gray-400 border border-gray-800/80 hover:bg-gray-900 active:scale-95 font-medium transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span>PHOTO</span>
            </button>
            
            <!-- LIVE CAMERA 버튼 -->
            <button id="btn-camera" class="flex items-center justify-center gap-2 py-3 px-4 rounded-2xl bg-gray-950 text-gray-400 border border-gray-800/80 hover:bg-gray-900 active:scale-95 text-gray-300 font-medium transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                <span>LIVE CAMERA</span>
            </button>
        </div>

        <!-- 숨겨진 파일 인풋 엘리먼트 -->
        <input type="file" id="file-input" accept="image/*" class="hidden">

        <!-- 2. 중간 큰 직사각형 모양의 빈 미리보기 영역 -->
        <div class="relative w-full aspect-[3/4] rounded-3xl bg-gray-900 border-2 border-dashed border-gray-800 flex flex-col items-center justify-center p-6 text-center transition-all duration-300 overflow-hidden shadow-inner">
            <!-- 가상의 격자 무늬 배경 데코레이션 -->
            <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 20px 20px;"></div>
            
            <!-- 업로드한 이미지가 보여지는 엘리먼트 (GPU 필터 가속 대응) -->
            <img id="preview-image" class="absolute inset-0 w-full h-full object-cover rounded-3xl hidden transition-all duration-300" alt="색 시뮬레이션 이미지">

            <!-- 실시간 카메라 스트리밍 비디오 엘리먼트 (GPU 필터 가속 대응) -->
            <video id="preview-video" class="absolute inset-0 w-full h-full object-cover rounded-3xl hidden transition-all duration-300" autoplay playsinline muted></video>

            <!-- 준비됨 플레이스홀더 (아무 미디어도 선택되지 않았을 때 표시) -->
            <div id="placeholder" class="relative z-10 flex flex-col items-center gap-4">
                <!-- 렌즈 아이콘 -->
                <div class="w-16 h-16 rounded-2xl bg-gray-850 border border-gray-800 flex items-center justify-center text-gray-500 shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </div>
                <div>
                    <h3 class="text-sm font-semibold text-gray-400">미리보기 준비됨</h3>
                    <p class="text-xs text-gray-600 mt-1 px-4 leading-relaxed">위의 버튼을 눌러 사진을 불러오거나 카메라를 연결하면 시뮬레이션이 여기에 표시됩니다.</p>
                </div>
            </div>
        </div>

        <!-- 3. 하단 시야 유형 선택 버튼 (한 줄로 배치) -->
        <div class="w-full flex flex-col gap-2">
            <span class="text-[10px] font-bold uppercase tracking-widest text-gray-600 ml-1">시야 필터 선택</span>
            <div class="grid grid-cols-3 gap-2 w-full bg-gray-900 p-1.5 rounded-2xl border border-gray-800">
                <!-- 일반 시야 버튼 (기본 활성화) -->
                <button id="filter-normal" class="filter-btn py-3 px-1 rounded-xl text-xs font-semibold transition-all duration-200 bg-gray-850 text-white shadow-sm">
                    일반 시야
                </button>
                <!-- 적록색맹 버튼 -->
                <button id="filter-rg" class="filter-btn py-3 px-1 rounded-xl text-xs font-semibold transition-all duration-200 text-gray-500 hover:text-gray-300">
                    적록색맹
                </button>
                <!-- 청황색맹 버튼 -->
                <button id="filter-by" class="filter-btn py-3 px-1 rounded-xl text-xs font-semibold transition-all duration-200 text-gray-500 hover:text-gray-300">
                    청황색맹
                </button>
            </div>
        </div>

    </main>

    <!-- 커스텀 에러 모달 안내창 (alert 대용) -->
    <div id="error-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm hidden">
        <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl scale-95 transition-all duration-300">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-950 text-red-500 mb-4 border border-red-900/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-base font-bold text-gray-200">연결 오류</h3>
            <p id="error-modal-message" class="text-xs text-gray-500 mt-2 leading-relaxed">카메라 권한 접근을 거부하셨거나 지원되지 않는 장치입니다.</p>
            <button id="error-modal-close" class="mt-5 w-full py-2.5 rounded-xl bg-gray-800 hover:bg-gray-750 active:scale-95 text-xs font-semibold text-gray-300 transition-all border border-gray-750">
                확인
            </button>
        </div>
    </div>

    <!-- 하단 여백 및 정보 -->
    <footer class="w-full max-w-md mx-auto px-6 py-6 text-center">
        <span class="text-[10px] text-gray-700">색맹 시뮬레이터 v1.1 • 실시간 엔진 탑재</span>
    </footer>

    <!-- 기능 제어 스크립트 -->
    <script>
        // 전역 상태 변수
        let currentFilter = 'normal'; // 'normal', 'rg', 'by'
        let localStream = null;       // 실시간 카메라 스트림 객체
        let currentObjectUrl = null;  // 업로드 이미지 메모리 해제 관리용

        // DOM 엘리먼트 획득
        const btnPhoto = document.getElementById('btn-photo');
        const btnCamera = document.getElementById('btn-camera');
        const fileInput = document.getElementById('file-input');
        
        const previewImage = document.getElementById('preview-image');
        const previewVideo = document.getElementById('preview-video');
        const placeholder = document.getElementById('placeholder');
        
        const filterButtons = document.querySelectorAll('.filter-btn');
        const filterNormal = document.getElementById('filter-normal');
        const filterRg = document.getElementById('filter-rg');
        const filterBy = document.getElementById('filter-by');

        const errorModal = document.getElementById('error-modal');
        const errorModalMessage = document.getElementById('error-modal-message');
        const errorModalClose = document.getElementById('error-modal-close');

        // 1. 미디어 버튼 디자인 및 활성화 표시 업데이트 함수
        function setActiveSourceUI(activeType) {
            const activeClass = "flex items-center justify-center gap-2 py-3 px-4 rounded-2xl bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white font-medium transition-all shadow-lg shadow-indigo-600/20 border-transparent";
            const inactiveClass = "flex items-center justify-center gap-2 py-3 px-4 rounded-2xl bg-gray-950 text-gray-400 border border-gray-800/80 hover:bg-gray-900 active:scale-95 font-medium transition-all";

            if (activeType === 'photo') {
                btnPhoto.className = activeClass;
                btnCamera.className = inactiveClass;
            } else if (activeType === 'camera') {
                btnPhoto.className = inactiveClass;
                btnCamera.className = activeClass;
            } else {
                btnPhoto.className = inactiveClass;
                btnCamera.className = inactiveClass;
            }
        }

        // 2. 실시간 필터 적용 연산 함수 (하드웨어 가속 SVG 렌더링 호출)
        function applyFilterToMedia() {
            const filterMap = {
                'normal': 'none',
                'rg': 'url(#deuteranopia-filter)',
                'by': 'url(#tritanopia-filter)'
            };

            const selectedFilterStyle = filterMap[currentFilter] || 'none';

            // 이미지와 비디오가 로드될 때 바로 대응되도록 두 소스 모두에 선제적으로 적용시킵니다.
            previewImage.style.filter = selectedFilterStyle;
            previewImage.style.webkitFilter = selectedFilterStyle;

            previewVideo.style.filter = selectedFilterStyle;
            previewVideo.style.webkitFilter = selectedFilterStyle;
        }

        // 3. 기존 동작 스트림 클린업 해제 함수
        function stopAllActiveStreams() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (currentObjectUrl) {
                URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = null;
            }
            previewVideo.srcObject = null;
        }

        // 4. 에러 모달 제어 함수
        function showError(message) {
            errorModalMessage.textContent = message;
            errorModal.classList.remove('hidden');
        }
        
        errorModalClose.addEventListener('click', () => {
            errorModal.classList.add('hidden');
        });

        // 5. [PHOTO] 로직 처리
        btnPhoto.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 카메라 등 기존 소스 자원 반납
            stopAllActiveStreams();

            // 메모리 매핑 후 타겟 바인딩
            currentObjectUrl = URL.createObjectURL(file);
            previewImage.src = currentObjectUrl;

            previewImage.onload = () => {
                // UI 전환 및 노출 제어
                placeholder.classList.add('hidden');
                previewVideo.classList.add('hidden');
                previewImage.classList.remove('hidden');

                setActiveSourceUI('photo');
                applyFilterToMedia(); // 현재 선택되어 있는 색맹 필터 즉각 유지 반영
            };
        });

        // 6. [LIVE CAMERA] 로직 처리
        btnCamera.addEventListener('click', async () => {
            stopAllActiveStreams();

            // 고해상도 후면 카메라 우선 타겟팅 후 불가 시 전면 카메라 우회
            const cameraOptions = [
                { video: { facingMode: 'environment' }, audio: false },
                { video: true, audio: false }
            ];

            let cameraStream = null;
            let accessError = null;

            for (const option of cameraOptions) {
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia(option);
                    if (cameraStream) break;
                } catch (err) {
                    accessError = err;
                }
            }

            if (cameraStream) {
                localStream = cameraStream;
                previewVideo.srcObject = cameraStream;
                
                // 비디오 메타데이터가 로드되면 즉시 재생
                previewVideo.onloadedmetadata = () => {
                    previewVideo.play();
                };

                // UI 전환 및 노출 제어
                placeholder.classList.add('hidden');
                previewImage.classList.add('hidden');
                previewVideo.classList.remove('hidden');

                setActiveSourceUI('camera');
                applyFilterToMedia(); // 현재 선택되어 있는 색맹 필터 즉각 유지 반영
            } else {
                console.error("Camera connection failed:", accessError);
                showError("카메라 접근 권한이 거부되었거나 연결할 수 있는 카메라 장치가 없습니다. 브라우저 설정에서 카메라 권한을 확인해주세요.");
            }
        });

        // 7. [필터 탭 전환 이벤트 리스너]
        const filterStateConfig = [
            { btn: filterNormal, filterId: 'normal' },
            { btn: filterRg, filterId: 'rg' },
            { btn: filterBy, filterId: 'by' }
        ];

        filterStateConfig.forEach(config => {
            config.btn.addEventListener('click', () => {
                // 이전에 활성화되어 있던 버튼들의 디자인 상태를 초기화
                filterStateConfig.forEach(item => {
                    item.btn.className = "filter-btn py-3 px-1 rounded-xl text-xs font-semibold transition-all duration-200 text-gray-500 hover:text-gray-300";
                });

                // 누른 버튼을 포커싱 컬러로 지정
                config.btn.className = "filter-btn py-3 px-1 rounded-xl text-xs font-semibold transition-all duration-200 bg-gray-850 text-white shadow-sm";

                // 전역 필터 적용 상태 동기화 및 즉각적 변화 구현
                currentFilter = config.filterId;
                applyFilterToMedia();
            });
        });
    </script>
</body>
</html>
